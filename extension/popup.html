<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logo-icon {
      width: 32px;
      height: 32px;
      background: #6366f1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: white;
    }
    .logo-text { font-size: 16px; font-weight: 700; }
    .badge {
      display: inline-block;
      background: rgba(99,102,241,0.15);
      color: #6366f1;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 14px;
    }
    .info { font-size: 12px; color: #888; line-height: 1.6; margin-bottom: 14px; }
    .section { margin-bottom: 16px; }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 8px;
    }
    .cmd-list { list-style: none; }
    .cmd-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 13px;
    }
    .cmd-command {
      font-family: "SF Mono", "Fira Code", monospace;
      background: rgba(99,102,241,0.12);
      color: #6366f1;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      flex-shrink: 0;
    }
    .cmd-title { color: #ccc; }
    .cmd-cat { margin-left: auto; font-size: 10px; color: #555; }
    .footer {
      font-size: 11px;
      color: #555;
      text-align: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }
    .footer a { color: #6366f1; text-decoration: none; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon">P</div>
    <span class="logo-text">PromptX</span>
  </div>
  <div class="badge">已激活 — 注入到当前页面</div>

  <div class="info">
    在任意 AI 聊天平台的输入框中输入 <strong>\</strong> 即可唤起指令菜单，选择指令后自动填入提示词模板。
  </div>

  <div class="section">
    <div class="section-title">可用指令</div>
    <ul class="cmd-list" id="cmdList"></ul>
  </div>

  <div class="footer">
    <a href="http://localhost:3000" target="_blank">打开 PromptX 管理面板</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
